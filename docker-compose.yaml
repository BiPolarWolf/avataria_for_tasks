version: '3.8'

services:
  db:
    image: postgres:15
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password # На сервере заменим на надежный из .env
      - POSTGRES_DB=hello_db
    # Порты наружу не пробрасываем ради безопасности

  backend:
    build: ./backend
    # Если на сервере будет Nginx/Certbot для HTTPS, 
    # порт 8000 наружу можно тоже закрыть, но пока оставим для тестов
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    # Убрали volumes, чтобы использовать чистую сборку из контейнера
    depends_on:
      - backend

volumes:
  postgres_data: