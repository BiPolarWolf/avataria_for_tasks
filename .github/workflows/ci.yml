name: CI Check

# Когда запускать? При каждом пуше в ветку main
on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  # Шаг 1: Тестируем код
  test-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run Tests
        run: |
          cd backend
          pytest
      
  # Задача №2: Проверка бэкенда (Только если тесты прошли)
  build-backend:
    runs-on: ubuntu-latest
    needs: test-backend # <--- ТУТ МАГИЯ

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Backend Image
        run: |
          cd backend
          docker build -t test-backend-image .
          
  # Задача №3: (Пока просто заглушка для фронтенда)
  test-frontend:
      runs-on: ubuntu-latest
      steps:
      
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Set up Node.js
          uses: actions/setup-node@v3
          with:
            node-version: '22'
            
        - name: Install & Build
          run: |
            cd frontend
            npm install
            npm run build  # Если сборка упадет, CI тоже упадет

  build-frontend:
    runs-on: ubuntu-latest
    needs: test-frontend # <--- ТУТ МАГИЯ

    steps:
      - uses: actions/checkout@v4

      - name: Build Frontend Docker Image
        run: |
          cd frontend
          # Мы просто проверяем, что образ собирается без ошибок
          docker build -t frontend-test .