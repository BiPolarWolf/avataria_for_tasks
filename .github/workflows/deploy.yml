name: Deploy to Production

# Запускать процесс только при пуше в ветку master
on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Скачиваем код из репозитория внутрь виртуальной машины GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Копируем файлы на твой удаленный VPS сервер по SSH
      - name: Copy files to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "."
          target: "/home/apps/hello-world-project"

      # 3. Подключаемся к серверу по SSH и перезапускаем Docker-контейнеры
      - name: Executing remote ssh commands to deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /home/apps/hello-world-project
            # Собираем новые образы и запускаем в фоновом режиме (-d)
            docker compose down
            docker compose up --build -d